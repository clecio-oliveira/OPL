<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPL Project Schedule — Phase 1</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0f1623;
  --surface:   #161e2e;
  --surface2:  #1a2340;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --text:      #e8edf5;
  --muted:     #6b7fa0;
  --faint:     rgba(255,255,255,0.035);
  --today-clr: #ff7875;
  --today-bg:  rgba(255,120,117,0.14);
  --today-bdr: rgba(255,120,117,0.35);
  --toggle-bg: #1c2540;
  --toggle-bd: rgba(255,255,255,0.12);
  --toggle-tx: #a0b0cc;
  --col-left: 232px;
  --row-h: 26px;
  --bar-h: 15px;
}
[data-theme="light"] {
  --bg:        #f0f4f8;
  --surface:   #ffffff;
  --surface2:  #eef2f7;
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.13);
  --text:      #1a202c;
  --muted:     #718096;
  --faint:     rgba(0,0,0,0.025);
  --today-clr: #c53030;
  --today-bg:  rgba(197,48,48,0.09);
  --today-bdr: rgba(197,48,48,0.28);
  --toggle-bg: #ffffff;
  --toggle-bd: rgba(0,0,0,0.13);
  --toggle-tx: #718096;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:28px 36px 36px;
  transition:background 0.25s,color 0.25s;
}
.slide-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:24px;gap:16px;
}
.slide-title h1{
  font-size:20px;font-weight:700;color:var(--text);
  letter-spacing:-0.02em;line-height:1.2;
}
.slide-title p{font-size:11px;color:var(--muted);margin-top:4px;font-weight:400}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.today-badge{
  font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;
  background:var(--today-bg);color:var(--today-clr);
  border:1px solid var(--today-bdr);white-space:nowrap;
}
.toggle-btn{
  display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;
  background:var(--toggle-bg);border:1px solid var(--toggle-bd);
  color:var(--toggle-tx);font-family:'Poppins',sans-serif;
  font-size:11px;font-weight:500;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;
}
.toggle-btn:hover{opacity:0.75}

.gantt-wrap{overflow-x:auto}
.gantt{
  min-width:900px;border-radius:12px;overflow:hidden;
  border:1px solid var(--border2);transition:border-color 0.25s;
}
.thead{display:flex;background:var(--surface);border-bottom:1px solid var(--border2)}
.thead-left{
  width:var(--col-left);flex-shrink:0;
  border-right:1px solid var(--border2);display:flex;flex-direction:column;
}
.thead-top{
  height:26px;display:flex;align-items:center;padding:0 14px;
  font-size:9px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--border);
}
.thead-bot{height:22px;display:flex;align-items:center;padding:0 14px;font-size:9px;color:var(--muted)}
.thead-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mo-row{display:flex;height:26px;border-bottom:1px solid var(--border)}
.mo-cell{
  flex:none;font-size:10px;font-weight:600;color:var(--muted);text-align:center;
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--border2);letter-spacing:0.04em;text-transform:uppercase;overflow:hidden;
}
.mo-cell:last-child{border-right:none}
.dt-row{height:22px;position:relative}
.dt-tick{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center}
.dt-tick span{font-size:9px;color:var(--muted);transform:translateX(-50%);display:block;white-space:nowrap;font-weight:500}
.today-hdr{position:absolute;top:0;bottom:0;display:flex;align-items:center;z-index:10}
.today-chip{
  font-size:8px;font-weight:700;color:var(--today-clr);
  background:var(--today-bg);border:1px solid var(--today-bdr);
  padding:2px 6px;border-radius:20px;transform:translateX(-50%);white-space:nowrap;letter-spacing:0.04em;
}
.group-row{
  display:flex;align-items:stretch;height:26px;
  background:var(--surface2);border-top:1px solid var(--border2);border-bottom:1px solid var(--border);
}
.group-label-cell{
  width:var(--col-left);flex-shrink:0;
  border-right:1px solid var(--border2);
  display:flex;align-items:center;gap:8px;padding:0 14px;
}
.group-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em}
.group-bar-area{flex:1;position:relative}
.task-row{
  display:flex;border-bottom:1px solid var(--border);
  height:var(--row-h);transition:background 0.1s;
}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--faint)}
.task-left{
  width:var(--col-left);flex-shrink:0;padding:0 14px;
  border-right:1px solid var(--border);
  display:flex;align-items:center;gap:7px;
}
.task-num{font-size:9px;font-weight:600;color:var(--muted);min-width:16px;text-align:right;flex-shrink:0}
.task-name{font-size:11px;font-weight:400;color:var(--text);line-height:1.25;flex:1}
.ms-pill{
  font-size:8px;font-weight:700;padding:1px 5px;border-radius:20px;
  flex-shrink:0;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;
}
.bar-area{flex:1;position:relative;display:flex;align-items:center}
.gw{position:absolute;top:0;bottom:0;width:1px;pointer-events:none}
.task-bar{position:absolute;height:var(--bar-h);border-radius:4px;top:50%;transform:translateY(-50%)}
.ms-bar{position:absolute;height:var(--bar-h);border-radius:4px;top:50%;transform:translateY(-50%);opacity:0.22}
.ms-dia{position:absolute;width:13px;height:13px;border-radius:2px;top:50%;transform:translateY(-50%) translateX(-6px) rotate(45deg)}
.tdy{position:absolute;top:0;bottom:0;width:2px;z-index:5;pointer-events:none;background:var(--today-clr)}
.legend{display:flex;align-items:center;gap:20px;margin-top:14px;padding:0 2px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted)}
.leg-line{width:18px;height:2px;background:var(--today-clr);border-radius:1px}
.leg-dia{width:9px;height:9px;border-radius:1px;background:var(--muted);transform:rotate(45deg);flex-shrink:0}
.leg-bar{width:22px;height:10px;border-radius:3px;background:var(--muted);opacity:0.6}
</style>
</head>
<body>

<div class="slide-header">
  <div class="slide-title">
    <h1>OPL Library — Program Registration &amp; Room Rental</h1>
    <p>Tentative Project Schedule &nbsp;·&nbsp; Phase 1 &nbsp;·&nbsp; Attachment C</p>
  </div>
  <div class="header-right">
    <div class="today-badge">Today: Mar 31, 2026</div>
    <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">Light mode</span>
    </button>
  </div>
</div>

<div class="gantt-wrap">
  <div class="gantt" id="gantt"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="leg-line"></div><span>Today</span></div>
  <div class="legend-item"><div class="leg-dia"></div><span>Milestone</span></div>
  <div class="legend-item"><div class="leg-bar"></div><span>Task duration</span></div>
</div>

<script>
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeIcon').textContent=isDark?'🌙':'☀️';
  document.getElementById('themeLabel').textContent=isDark?'Dark mode':'Light mode';
}

(function(){
const S=new Date(2026,0,1),E=new Date(2026,6,1),SP=E-S;
const TOD=new Date(2026,2,31);
const tp=d=>Math.max(0,Math.min(100,(new Date(d)-S)/SP*100));
const todPct=(TOD-S)/SP*100;

const MONTH_DEFS=[
  {year:2026,mo:0,label:"Jan '26",days:31},
  {year:2026,mo:1,label:"Feb '26",days:28},
  {year:2026,mo:2,label:"Mar '26",days:31},
  {year:2026,mo:3,label:"Apr '26",days:30},
  {year:2026,mo:4,label:"May '26",days:31},
  {year:2026,mo:5,label:"Jun '26",days:30},
];
const TD=MONTH_DEFS.reduce((a,m)=>a+m.days,0);
let accD=0;
const MW=MONTH_DEFS.map(m=>{const l=accD/TD*100;accD+=m.days;return{...m,l,w:m.days/TD*100};});

const dateTicks=[];
MONTH_DEFS.forEach(m=>{
  [1,8,15,22,29].forEach(day=>{
    if(day<=m.days){
      const d=new Date(m.year,m.mo,day);
      if(d>=S&&d<E) dateTicks.push({leftPct:(d-S)/SP*100,label:day});
    }
  });
});

const GROUPS=[
  {lbl:"Project Planning",clr:"#9F7AEA",tasks:[
    {id:0,n:"Pre-Implementation Discussions",s:"2025-11-13",e:"2026-02-16",ms:false},
    {id:1,n:"Project Plan",s:"2026-01-20",e:"2026-02-23",ms:false},
  ]},
  {lbl:"Account Configuration",clr:"#4299E1",tasks:[
    {id:2,n:"OOTB Config & Integration Instructions",s:"2026-01-20",e:"2026-02-28",ms:false},
    {id:3,n:"OOTB Configuration (Production)",s:"2026-01-20",e:"2026-03-09",ms:false},
    {id:4,n:"OOTB Config & Accessibility Review",s:"2026-03-10",e:"2026-03-16",ms:false},
    {id:5,n:"OOTB Config & Accessibility Adjustments",s:"2026-03-17",e:"2026-03-23",ms:false},
    {id:6,n:"OOTB Configuration Validation",s:"2026-03-24",e:"2026-03-26",ms:false},
  ]},
  {lbl:"Test Environment",clr:"#38B2AC",tasks:[
    {id:7,n:"Test Environment (Sandbox) Ready",s:"2026-03-27",e:"2026-03-31",ms:true},
  ]},
  {lbl:"Data Migration",clr:"#ED8936",tasks:[
    {id:8,n:"Data Migration & Validation (Production)",s:"2026-03-31",e:"2026-04-27",ms:true},
  ]},
  {lbl:"User Training, Testing & Validations",clr:"#48BB78",tasks:[
    {id:9,n:"OOTB Integrations Config & Testing (Sandbox)",s:"2026-03-31",e:"2026-04-06",ms:false},
    {id:10,n:"Staff Training, Wave 1 (Foundational)",s:"2026-03-31",e:"2026-04-06",ms:false},
    {id:11,n:"Staff Training, Wave 1 (Advanced/Make-up)",s:"2026-04-07",e:"2026-04-13",ms:false},
    {id:13,n:"User Acceptance Testing (UAT) (Sandbox)",s:"2026-04-07",e:"2026-04-20",ms:false},
    {id:14,n:"OOTB Integrations Config & Testing (Prod)",s:"2026-04-07",e:"2026-04-13",ms:false},
    {id:15,n:"Security & Privacy Validation (Prod)",s:"2026-04-07",e:"2026-04-13",ms:false},
    {id:16,n:"Cutover Planning & Runbooks",s:"2026-04-14",e:"2026-04-27",ms:false},
  ]},
  {lbl:"Internal Soft Launch & Practice",clr:"#F687B3",tasks:[
    {id:17,n:"Internal Soft Launch / Staff-Only (Prod)",s:"2026-05-01",e:"2026-05-01",ms:true},
    {id:18,n:"Stabilization & Staff Practice (Prod)",s:"2026-05-01",e:"2026-05-18",ms:false},
  ]},
  {lbl:"Public Launch / Go-Live",clr:"#FC8181",tasks:[
    {id:19,n:"Final Go/No-Go Readiness Review",s:"2026-05-19",e:"2026-05-21",ms:false},
    {id:20,n:"Public Launch / Go-Live (Production)",s:"2026-06-01",e:"2026-06-01",ms:true},
  ]},
  {lbl:"Post-Launch",clr:"#76E4F7",tasks:[
    {id:21,n:"Hypercare",s:"2026-06-01",e:"2026-06-15",ms:false},
    {id:22,n:"Post-Implementation Review",s:"2026-06-16",e:"2026-06-29",ms:false},
  ]},
];

const gantt=document.getElementById('gantt');

let moHtml='';
MW.forEach(m=>{moHtml+=`<div class="mo-cell" style="width:${m.w}%">${m.label}</div>`;});

let dtHtml=`<div class="today-hdr" style="left:${todPct}%"><div class="today-chip">TODAY</div></div>`;
dateTicks.forEach(tk=>{dtHtml+=`<div class="dt-tick" style="left:${tk.leftPct}%"><span>${tk.label}</span></div>`;});

gantt.innerHTML=`<div class="thead">
  <div class="thead-left">
    <div class="thead-top">Phase / Task</div>
    <div class="thead-bot">Day</div>
  </div>
  <div class="thead-right">
    <div class="mo-row">${moHtml}</div>
    <div class="dt-row">${dtHtml}</div>
  </div>
</div>`;

let gridHtml='';
dateTicks.forEach(tk=>{gridHtml+=`<div class="gw" style="left:${tk.leftPct}%;background:var(--border)"></div>`;});
MW.forEach(m=>{if(m.l>0)gridHtml+=`<div class="gw" style="left:${m.l}%;background:var(--border2)"></div>`;});
const todHtml=`<div class="tdy" style="left:${todPct}%"></div>`;

GROUPS.forEach(g=>{
  const grEl=document.createElement('div');
  grEl.className='group-row';
  grEl.innerHTML=`
    <div class="group-label-cell" style="border-left:3px solid ${g.clr}">
      <div class="group-dot" style="background:${g.clr}"></div>
      <span class="group-label" style="color:${g.clr}">${g.lbl}</span>
    </div>
    <div class="group-bar-area">${gridHtml}</div>`;
  gantt.appendChild(grEl);

  g.tasks.forEach(t=>{
    const lp=tp(t.s);
    const rp=tp(t.e);
    let wp=rp-lp;
    let barHtml='';
    if(t.ms&&wp<0.2){
      barHtml=`<div class="ms-dia" style="left:${lp}%;background:${g.clr}"></div>`;
    } else {
      if(wp<0.6)wp=0.6;
      if(t.ms){
        barHtml=`<div class="ms-bar" style="left:${lp}%;width:${wp}%;background:${g.clr}"></div>
                 <div class="ms-dia" style="left:${rp}%;background:${g.clr}"></div>`;
      } else {
        barHtml=`<div class="task-bar" style="left:${lp}%;width:${wp}%;background:${g.clr};opacity:0.82"></div>`;
      }
    }
    const pill=t.ms?`<span class="ms-pill" style="background:${g.clr}20;color:${g.clr};border:1px solid ${g.clr}40">MS</span>`:'';
    const row=document.createElement('div');
    row.className='task-row';
    row.innerHTML=`
      <div class="task-left" style="border-left:3px solid ${g.clr}28">
        <span class="task-num">#${t.id}</span>
        <span class="task-name">${t.n}</span>${pill}
      </div>
      <div class="bar-area">${gridHtml}${todHtml}${barHtml}</div>`;
    gantt.appendChild(row);
  });
});
})();
</script>
</body>
</html>
