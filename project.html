<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Timeline with Collapsible Controls</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#eef1f5;
  --panel:#f5f6f8;
  --grid:#d9dee6;
  --grid-strong:#c8ced8;
  --text:#475467;
  --muted:#7a8599;
  --today:#e05347;

  --left-col: 470px;
  --row-h: 34px;
  --group-h: 24px;
  --radius: 14px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:18px;
}

.toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.toolbar-left{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.toolbar-title{
  font-size:18px;
  font-weight:700;
  color:#344054;
}

.toolbar-note{
  font-size:12px;
  color:var(--muted);
}

.toolbar-right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

button, select{
  border:1px solid var(--grid-strong);
  background:white;
  color:#344054;
  border-radius:10px;
  padding:8px 12px;
  font:600 12px/1 Inter,sans-serif;
}

button{
  cursor:pointer;
}

button:hover{
  background:#f8fafc;
}

.filter-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}

.filter-label{
  font-size:12px;
  font-weight:600;
  color:#667085;
}

.gantt-wrap{
  width:100%;
  overflow-x:auto;
}

.gantt{
  min-width:2100px;
  background:var(--panel);
  border:1px solid var(--grid-strong);
  border-radius:var(--radius);
  overflow:hidden;
}

.thead{
  display:flex;
  background:var(--panel);
  border-bottom:1px solid var(--grid-strong);
}

.thead-left{
  width:var(--left-col);
  flex-shrink:0;
  border-right:1px solid var(--grid-strong);
}

.thead-top,
.thead-bot{
  display:flex;
  align-items:center;
  padding:0 12px;
  color:#6b7280;
  font-size:11px;
  font-weight:600;
}

.thead-top{
  height:34px;
  border-bottom:1px solid var(--grid);
  text-transform:uppercase;
  letter-spacing:.04em;
}

.thead-bot{
  height:28px;
}

.thead-right{
  flex:1;
  position:relative;
}

.mo-row{
  display:flex;
  height:34px;
  border-bottom:1px solid var(--grid);
}

.mo-cell{
  display:flex;
  align-items:center;
  justify-content:center;
  flex:none;
  border-right:1px solid var(--grid-strong);
  color:#7a8599;
  font-size:13px;
  font-weight:700;
  letter-spacing:.02em;
  text-transform:uppercase;
}

.mo-cell:last-child{
  border-right:none;
}

.dt-row{
  height:28px;
  position:relative;
}

.dt-tick{
  position:absolute;
  top:0;
  bottom:0;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#8b95a7;
  font-size:11px;
  font-weight:600;
  white-space:nowrap;
}

.today-header{
  position:absolute;
  top:0;
  bottom:0;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  z-index:4;
}

.today-chip{
  background:#fff;
  color:var(--today);
  border:1px solid rgba(224,83,71,.35);
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  padding:2px 8px;
}

.group-row{
  display:flex;
  height:var(--group-h);
  background:#f7f8fa;
  border-top:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
}

.group-label-cell{
  width:var(--left-col);
  flex-shrink:0;
  border-right:1px solid var(--grid-strong);
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 12px;
}

.group-dot{
  width:8px;
  height:8px;
  border-radius:2px;
  flex-shrink:0;
}

.group-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
}

.group-bar-area{
  flex:1;
  position:relative;
}

.task-row{
  display:flex;
  height:var(--row-h);
  border-bottom:1px solid var(--grid);
  background:transparent;
}

.task-left{
  width:var(--left-col);
  flex-shrink:0;
  border-right:1px solid var(--grid);
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 10px 0 12px;
  overflow:hidden;
}

.task-num{
  min-width:26px;
  font-size:11px;
  color:#6f7a8d;
  font-weight:600;
}

.task-name{
  min-width:0;
  flex:1;
  font-size:11px;
  line-height:1.15;
  color:#4a5568;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.row-controls-wrap{
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}

.row-toggle-btn{
  padding:5px 8px;
  border-radius:8px;
  font-size:11px;
  line-height:1;
}

.row-controls{
  display:flex;
  align-items:center;
  gap:6px;
  overflow:hidden;
  max-width:260px;
  opacity:1;
  transition:max-width .22s ease, opacity .18s ease, margin .18s ease;
}

.row-controls.is-collapsed{
  max-width:0;
  opacity:0;
  pointer-events:none;
}

.row-mini-btn{
  padding:5px 8px;
  border-radius:8px;
  font-size:11px;
  line-height:1;
}

.row-color{
  width:28px;
  height:24px;
  border:1px solid var(--grid-strong);
  border-radius:7px;
  padding:2px;
  background:white;
  cursor:pointer;
}

.row-status{
  font-size:10px;
  color:#8b95a7;
  min-width:52px;
  text-align:center;
}

.bar-area{
  flex:1;
  position:relative;
  overflow:hidden;
}

.grid-v{
  position:absolute;
  top:0;
  bottom:0;
  width:1px;
  background:var(--grid);
  pointer-events:none;
}

.grid-v.month{
  background:var(--grid-strong);
}

.today-line{
  position:absolute;
  top:0;
  bottom:0;
  width:2px;
  background:var(--today);
  z-index:3;
  pointer-events:none;
}

.bar-shell{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  height:20px;
  z-index:7;
}

.task-bar{
  position:absolute;
  inset:3px 0 3px 0;
  border-radius:999px;
  cursor:grab;
  touch-action:none;
  box-shadow:0 1px 0 rgba(0,0,0,.05);
  opacity:.96;
}

.task-bar:active{
  cursor:grabbing;
}

.task-bar.selected{
  outline:2px solid #111827;
  outline-offset:2px;
}

.resize-handle{
  position:absolute;
  top:0;
  width:10px;
  height:20px;
  z-index:8;
  cursor:ew-resize;
  touch-action:none;
}

.resize-handle.left{ left:-2px; }
.resize-handle.right{ right:-2px; }

.resize-handle::after{
  content:"";
  position:absolute;
  top:4px;
  bottom:4px;
  left:3px;
  right:3px;
  border-radius:999px;
  background:rgba(255,255,255,.78);
}

.tooltip{
  position:fixed;
  z-index:999;
  background:#111827;
  color:white;
  font-size:12px;
  font-weight:600;
  padding:8px 10px;
  border-radius:8px;
  pointer-events:none;
  white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  opacity:0;
  transform:translateY(-4px);
  transition:opacity .12s ease, transform .12s ease;
}

.tooltip.show{
  opacity:1;
  transform:translateY(0);
}

.legend{
  display:flex;
  align-items:center;
  gap:18px;
  margin-top:12px;
  padding:0 4px;
  color:#6f7a8d;
  font-size:12px;
  flex-wrap:wrap;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:7px;
}

.leg-line{
  width:16px;
  height:2px;
  background:var(--today);
}

.leg-bar{
  width:20px;
  height:10px;
  border-radius:999px;
  background:#aeb7c5;
}

.output{
  margin-top:14px;
  background:white;
  border:1px solid var(--grid-strong);
  border-radius:12px;
  padding:12px;
}

.output h3{
  font-size:13px;
  margin-bottom:8px;
  color:#344054;
}

.output textarea{
  width:100%;
  min-height:200px;
  border:1px solid var(--grid);
  border-radius:10px;
  padding:10px;
  font:12px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;
  resize:vertical;
  background:#fbfcfe;
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="toolbar-title">Interactive Timeline</div>
    <div class="toolbar-note">Filtre por fase, adicione barrinhas, selecione e altere a cor.</div>
  </div>

  <div class="toolbar-right">
    <div class="filter-wrap">
      <span class="filter-label">Filter phase</span>
      <select id="phaseFilter"></select>
    </div>
    <button id="saveBtn" type="button">Save</button>
    <button id="resetBtn" type="button">Reset</button>
    <button id="exportBtn" type="button">Export dates</button>
  </div>
</div>

<div class="gantt-wrap">
  <div class="gantt" id="gantt"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="leg-line"></div><span>Today</span></div>
  <div class="legend-item"><div class="leg-bar"></div><span>Task bar</span></div>
</div>

<div class="output">
  <h3>Updated task dates</h3>
  <textarea id="exportBox" readonly></textarea>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
(function () {
  const START = new Date(2026, 0, 1);
  const END = new Date(2026, 6, 1);
  const TODAY = new Date(2026, 2, 31);
  const MS_PER_DAY = 24 * 60 * 60 * 1000;
  const TOTAL_DAYS = Math.round((END - START) / MS_PER_DAY);
  const STORAGE_KEY = "interactive_timeline_multi_bars_v3";

  const months = [
    { year: 2026, mo: 0, label: "JAN '26", days: 31 },
    { year: 2026, mo: 1, label: "FEB '26", days: 28 },
    { year: 2026, mo: 2, label: "MAR '26", days: 31 },
    { year: 2026, mo: 3, label: "APR '26", days: 30 },
    { year: 2026, mo: 4, label: "MAY '26", days: 31 },
    { year: 2026, mo: 5, label: "JUN '26", days: 30 }
  ];

  const initialGroups = [
    {
      label: "PROJECT PLANNING",
      color: "#a67cf2",
      tasks: [
        { id: 0, name: "Pre-Implementation Discussions", bars: [{ start: "2025-11-13", end: "2026-04-15", color: "#a67cf2" }] },
        { id: 1, name: "Project Plan", bars: [{ start: "2026-01-20", end: "2026-04-15", color: "#a67cf2" }] }
      ]
    },
    {
      label: "ACCOUNT CONFIGURATION",
      color: "#5fa7ea",
      tasks: [
        { id: 2, name: "OOTB Config & Integration Instructions", bars: [{ start: "2026-01-20", end: "2026-03-22", color: "#5fa7ea" }] },
        { id: 3, name: "OOTB Configuration (Production)", bars: [{ start: "2026-01-20", end: "2026-03-15", color: "#5fa7ea" }] },
        { id: 4, name: "OOTB Config & Accessibility Review", bars: [{ start: "2026-03-10", end: "2026-04-08", color: "#5fa7ea" }] },
        { id: 5, name: "OOTB Config & Accessibility Adjustments", bars: [{ start: "2026-03-17", end: "2026-04-15", color: "#5fa7ea" }] },
        { id: 6, name: "OOTB Configuration Validation", bars: [{ start: "2026-03-24", end: "2026-04-22", color: "#5fa7ea" }] }
      ]
    },
    {
      label: "TEST ENVIRONMENT",
      color: "#6fd0c9",
      tasks: [
        { id: 7, name: "Test Environment (Sandbox) Ready", bars: [{ start: "2026-03-27", end: "2026-04-29", color: "#6fd0c9" }] }
      ]
    },
    {
      label: "DATA MIGRATION",
      color: "#e8b089",
      tasks: [
        { id: 8, name: "Data Migration & Validation (Production)", bars: [{ start: "2026-03-31", end: "2026-04-29", color: "#e8b089" }] }
      ]
    },
    {
      label: "USER TRAINING, TESTING & VALIDATIONS",
      color: "#59c57d",
      tasks: [
        { id: 9,  name: "OOTB Integrations Config & Testing (Sandbox)", bars: [{ start: "2026-03-31", end: "2026-04-06", color: "#59c57d" }] },
        { id: 10, name: "Staff Training, Wave 1 (Foundational)", bars: [{ start: "2026-03-31", end: "2026-04-06", color: "#59c57d" }] },
        { id: 11, name: "Staff Training, Wave 1 (Advanced/Make-up)", bars: [{ start: "2026-04-07", end: "2026-04-13", color: "#59c57d" }] },
        { id: 13, name: "User Acceptance Testing (UAT) (Sandbox)", bars: [{ start: "2026-04-07", end: "2026-04-20", color: "#59c57d" }] },
        { id: 14, name: "OOTB Integrations Config & Testing (Prod)", bars: [{ start: "2026-04-07", end: "2026-04-13", color: "#59c57d" }] },
        { id: 15, name: "Security & Privacy Validation (Prod)", bars: [{ start: "2026-04-07", end: "2026-04-13", color: "#59c57d" }] },
        { id: 16, name: "Cutover Planning & Runbooks", bars: [{ start: "2026-04-14", end: "2026-04-27", color: "#59c57d" }] }
      ]
    },
    {
      label: "INTERNAL SOFT LAUNCH & PRACTICE",
      color: "#ef8db8",
      tasks: [
        { id: 17, name: "Internal Soft Launch / Staff-Only (Prod)", bars: [{ start: "2026-05-01", end: "2026-05-01", color: "#ef8db8" }] },
        { id: 18, name: "Stabilization & Staff Practice (Prod)", bars: [{ start: "2026-05-01", end: "2026-05-18", color: "#ef8db8" }] }
      ]
    },
    {
      label: "PUBLIC LAUNCH / GO-LIVE",
      color: "#f18484",
      tasks: [
        { id: 19, name: "Final Go/No-Go Readiness Review", bars: [{ start: "2026-05-19", end: "2026-05-21", color: "#f18484" }] },
        { id: 20, name: "Public Launch / Go-Live (Production)", bars: [{ start: "2026-06-01", end: "2026-06-01", color: "#f18484" }] }
      ]
    },
    {
      label: "POST-LAUNCH",
      color: "#74dced",
      tasks: [
        { id: 21, name: "Hypercare", bars: [{ start: "2026-06-01", end: "2026-06-15", color: "#74dced" }] },
        { id: 22, name: "Post-Implementation Review", bars: [{ start: "2026-06-16", end: "2026-06-29", color: "#74dced" }] }
      ]
    }
  ];

  const state = {
    groups: deepClone(initialGroups),
    activeDrag: null,
    selected: null,
    phaseFilter: "ALL",
    rowControlsOpen: {}
  };

  const gantt = document.getElementById("gantt");
  const tooltip = document.getElementById("tooltip");
  const exportBox = document.getElementById("exportBox");
  const resetBtn = document.getElementById("resetBtn");
  const exportBtn = document.getElementById("exportBtn");
  const saveBtn = document.getElementById("saveBtn");
  const phaseFilter = document.getElementById("phaseFilter");

  function deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function parseLocalDate(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function labelDate(dateStr) {
    const d = parseLocalDate(dateStr);
    return d.toLocaleDateString("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric"
    });
  }

  function dayIndexFromDate(dateStr) {
    const d = parseLocalDate(dateStr);
    return Math.round((d - START) / MS_PER_DAY);
  }

  function clampDay(day) {
    return Math.max(0, Math.min(TOTAL_DAYS - 1, day));
  }

  function dateFromDayIndex(day) {
    const d = new Date(START.getTime() + clampDay(day) * MS_PER_DAY);
    return formatDate(d);
  }

  function pctFromDay(day) {
    return (clampDay(day) / TOTAL_DAYS) * 100;
  }

  function totalMonthDays() {
    return months.reduce((sum, m) => sum + m.days, 0);
  }

  function monthWidths() {
    let accDays = 0;
    const td = totalMonthDays();
    return months.map(m => {
      const left = (accDays / td) * 100;
      accDays += m.days;
      return { ...m, left, width: (m.days / td) * 100 };
    });
  }

  function buildTicks() {
    const ticks = [];
    months.forEach(m => {
      [1, 8, 15, 22, 29].forEach(day => {
        if (day <= m.days) {
          const d = new Date(m.year, m.mo, day);
          if (d >= START && d < END) {
            ticks.push({
              left: ((d - START) / (END - START)) * 100,
              label: day
            });
          }
        }
      });
    });
    return ticks;
  }

  function getVisibleGroups() {
    if (state.phaseFilter === "ALL") return state.groups;
    return state.groups.filter(group => group.label === state.phaseFilter);
  }

  function refreshPhaseFilterOptions() {
    const current = state.phaseFilter;
    phaseFilter.innerHTML = `<option value="ALL">All phases</option>`;
    state.groups.forEach(group => {
      const option = document.createElement("option");
      option.value = group.label;
      option.textContent = group.label;
      phaseFilter.appendChild(option);
    });
    phaseFilter.value = current;
  }

  function serializeState() {
    return {
      groups: state.groups,
      phaseFilter: state.phaseFilter,
      rowControlsOpen: state.rowControlsOpen
    };
  }

  function updateExportBox() {
    const lines = [];
    state.groups.forEach(group => {
      group.tasks.forEach(task => {
        task.bars.forEach((bar, index) => {
          lines.push(`${group.label} | #${task.id} | ${task.name} | bar ${index + 1} | ${bar.start} → ${bar.end} | ${bar.color}`);
        });
      });
    });
    exportBox.value = lines.join("\n");
  }

  function showTooltip(text, x, y) {
    tooltip.textContent = text;
    tooltip.style.left = `${x + 12}px`;
    tooltip.style.top = `${y - 12}px`;
    tooltip.classList.add("show");
  }

  function hideTooltip() {
    tooltip.classList.remove("show");
  }

  function getBarAreaWidth() {
    const barArea = gantt.querySelector(".bar-area");
    return barArea ? barArea.getBoundingClientRect().width : 1;
  }

  function pxToDayDelta(px) {
    return Math.round((px / getBarAreaWidth()) * TOTAL_DAYS);
  }

  function getBar(groupIndex, taskIndex, barIndex) {
    return state.groups[groupIndex].tasks[taskIndex].bars[barIndex];
  }

  function isSelected(groupIndex, taskIndex, barIndex) {
    return state.selected &&
      state.selected.groupIndex === groupIndex &&
      state.selected.taskIndex === taskIndex &&
      state.selected.barIndex === barIndex;
  }

  function selectBar(groupIndex, taskIndex, barIndex) {
    state.selected = { groupIndex, taskIndex, barIndex };
    render();
  }

  function barLabel(taskName, bar) {
    return `${taskName}\n${labelDate(bar.start)} → ${labelDate(bar.end)}`;
  }

  function addBar(groupIndex, taskIndex) {
    const task = state.groups[groupIndex].tasks[taskIndex];
    const defaultColor = task.bars[0]?.color || state.groups[groupIndex].color || "#5fa7ea";
    task.bars.push({
      start: "2026-04-01",
      end: "2026-04-08",
      color: defaultColor
    });
    state.selected = { groupIndex, taskIndex, barIndex: task.bars.length - 1 };
    state.rowControlsOpen[`${groupIndex}-${taskIndex}`] = true;
    render();
  }

  function deleteSelectedBar(groupIndex, taskIndex) {
    if (!state.selected) return;
    if (state.selected.groupIndex !== groupIndex || state.selected.taskIndex !== taskIndex) return;

    const bars = state.groups[groupIndex].tasks[taskIndex].bars;
    if (bars.length <= 1) return;

    bars.splice(state.selected.barIndex, 1);
    state.selected = null;
    render();
  }

  function changeSelectedBarColor(groupIndex, taskIndex, value) {
    if (!state.selected) return;
    if (state.selected.groupIndex !== groupIndex || state.selected.taskIndex !== taskIndex) return;

    const task = state.groups[groupIndex].tasks[taskIndex];
    const bar = task.bars[state.selected.barIndex];
    if (!bar) return;
    bar.color = value;
    render();
  }

  function toggleRowControls(groupIndex, taskIndex) {
    const key = `${groupIndex}-${taskIndex}`;
    state.rowControlsOpen[key] = !state.rowControlsOpen[key];
    render();
  }

  function isRowControlsOpen(groupIndex, taskIndex) {
    return !!state.rowControlsOpen[`${groupIndex}-${taskIndex}`];
  }

  function render() {
    refreshPhaseFilterOptions();

    const visibleGroups = getVisibleGroups();
    const mWidths = monthWidths();
    const ticks = buildTicks();
    const todayPct = ((TODAY - START) / (END - START)) * 100;

    let monthHtml = "";
    mWidths.forEach(m => {
      monthHtml += `<div class="mo-cell" style="width:${m.width}%">${m.label}</div>`;
    });

    let tickHtml = `<div class="today-header" style="left:${todayPct}%"><div class="today-chip">TODAY</div></div>`;
    ticks.forEach(t => {
      tickHtml += `<div class="dt-tick" style="left:${t.left}%">${t.label}</div>`;
    });

    gantt.innerHTML = `
      <div class="thead">
        <div class="thead-left">
          <div class="thead-top">PHASE / TASK / CONTROLS</div>
          <div class="thead-bot">Day</div>
        </div>
        <div class="thead-right">
          <div class="mo-row">${monthHtml}</div>
          <div class="dt-row">${tickHtml}</div>
        </div>
      </div>
    `;

    let gridHtml = "";
    ticks.forEach(t => {
      gridHtml += `<div class="grid-v" style="left:${t.left}%"></div>`;
    });
    mWidths.forEach(m => {
      if (m.left > 0) gridHtml += `<div class="grid-v month" style="left:${m.left}%"></div>`;
    });

    const todayLine = `<div class="today-line" style="left:${todayPct}%"></div>`;

    visibleGroups.forEach(group => {
      const groupIndex = state.groups.findIndex(g => g.label === group.label);

      const groupRow = document.createElement("div");
      groupRow.className = "group-row";
      groupRow.innerHTML = `
        <div class="group-label-cell">
          <div class="group-dot" style="background:${group.color}"></div>
          <div class="group-label" style="color:${group.color}">${group.label}</div>
        </div>
        <div class="group-bar-area">
          ${gridHtml}
          ${todayLine}
        </div>
      `;
      gantt.appendChild(groupRow);

      group.tasks.forEach((task, taskIndex) => {
        const selectedBar = state.selected &&
          state.selected.groupIndex === groupIndex &&
          state.selected.taskIndex === taskIndex
          ? task.bars[state.selected.barIndex]
          : null;

        let barsMarkup = "";
        task.bars.forEach((bar, barIndex) => {
          const startDay = clampDay(dayIndexFromDate(bar.start));
          const endDay = clampDay(dayIndexFromDate(bar.end));
          const left = pctFromDay(startDay);
          const width = Math.max(((Math.max(endDay - startDay, 0) + 1) / TOTAL_DAYS) * 100, 0.55);
          const selectedClass = isSelected(groupIndex, taskIndex, barIndex) ? "selected" : "";

          barsMarkup += `
            <div class="bar-shell" style="left:${left}%;width:${width}%;">
              <div class="task-bar ${selectedClass}"
                   data-action="move"
                   data-group-index="${groupIndex}"
                   data-task-index="${taskIndex}"
                   data-bar-index="${barIndex}"
                   style="background:${bar.color};"></div>
              <div class="resize-handle left"
                   data-action="resize-left"
                   data-group-index="${groupIndex}"
                   data-task-index="${taskIndex}"
                   data-bar-index="${barIndex}"></div>
              <div class="resize-handle right"
                   data-action="resize-right"
                   data-group-index="${groupIndex}"
                   data-task-index="${taskIndex}"
                   data-bar-index="${barIndex}"></div>
            </div>
          `;
        });

        const isOpen = isRowControlsOpen(groupIndex, taskIndex);
        const toggleText = isOpen ? "Controls ▾" : "Controls ▸";

        const row = document.createElement("div");
        row.className = "task-row";
        row.innerHTML = `
          <div class="task-left">
            <span class="task-num">#${task.id}</span>
            <span class="task-name">${task.name}</span>

            <div class="row-controls-wrap">
              <button class="row-toggle-btn toggle-controls-btn"
                      data-group-index="${groupIndex}"
                      data-task-index="${taskIndex}"
                      type="button">${toggleText}</button>

              <div class="row-controls ${isOpen ? "" : "is-collapsed"}">
                <button class="row-mini-btn add-bar-btn" data-group-index="${groupIndex}" data-task-index="${taskIndex}" type="button">+ Bar</button>
                <button class="row-mini-btn del-bar-btn" data-group-index="${groupIndex}" data-task-index="${taskIndex}" type="button">Delete</button>
                <input class="row-color color-input" type="color"
                       data-group-index="${groupIndex}" data-task-index="${taskIndex}"
                       value="${selectedBar ? selectedBar.color : (task.bars[0]?.color || group.color)}" />
                <span class="row-status">${selectedBar ? "selected" : "none"}</span>
              </div>
            </div>
          </div>

          <div class="bar-area">
            ${gridHtml}
            ${todayLine}
            ${barsMarkup}
          </div>
        `;
        gantt.appendChild(row);
      });
    });

    bindInteractions();
    updateExportBox();
  }

  function startInteraction(e, action, groupIndex, taskIndex, barIndex) {
    const bar = getBar(groupIndex, taskIndex, barIndex);
    state.activeDrag = {
      action,
      groupIndex,
      taskIndex,
      barIndex,
      startX: e.clientX,
      originalStartDay: clampDay(dayIndexFromDate(bar.start)),
      originalEndDay: clampDay(dayIndexFromDate(bar.end))
    };
    state.selected = { groupIndex, taskIndex, barIndex };
    state.rowControlsOpen[`${groupIndex}-${taskIndex}`] = true;
    showTooltip(barLabel(state.groups[groupIndex].tasks[taskIndex].name, bar), e.clientX, e.clientY);
  }

  function onPointerDown(e) {
    const target = e.target.closest("[data-action]");
    if (!target) return;

    e.preventDefault();

    const action = target.dataset.action;
    const groupIndex = Number(target.dataset.groupIndex);
    const taskIndex = Number(target.dataset.taskIndex);
    const barIndex = Number(target.dataset.barIndex);

    startInteraction(e, action, groupIndex, taskIndex, barIndex);

    window.addEventListener("pointermove", onPointerMove);
    window.addEventListener("pointerup", onPointerUp);
    render();
  }

  function onPointerMove(e) {
    if (!state.activeDrag) return;

    const drag = state.activeDrag;
    const bar = getBar(drag.groupIndex, drag.taskIndex, drag.barIndex);
    const deltaDays = pxToDayDelta(e.clientX - drag.startX);

    if (drag.action === "move") {
      const duration = Math.max(drag.originalEndDay - drag.originalStartDay, 0);
      let newStart = clampDay(drag.originalStartDay + deltaDays);
      let newEnd = clampDay(newStart + duration);

      if (newEnd >= TOTAL_DAYS) {
        newEnd = TOTAL_DAYS - 1;
        newStart = Math.max(0, newEnd - duration);
      }

      bar.start = dateFromDayIndex(newStart);
      bar.end = dateFromDayIndex(newEnd);
    }

    if (drag.action === "resize-left") {
      let newStart = clampDay(drag.originalStartDay + deltaDays);
      if (newStart > drag.originalEndDay) newStart = drag.originalEndDay;
      bar.start = dateFromDayIndex(newStart);
    }

    if (drag.action === "resize-right") {
      let newEnd = clampDay(drag.originalEndDay + deltaDays);
      if (newEnd < drag.originalStartDay) newEnd = drag.originalStartDay;
      bar.end = dateFromDayIndex(newEnd);
    }

    render();
    showTooltip(barLabel(state.groups[drag.groupIndex].tasks[drag.taskIndex].name, bar), e.clientX, e.clientY);
  }

  function onPointerUp() {
    state.activeDrag = null;
    hideTooltip();
    window.removeEventListener("pointermove", onPointerMove);
    window.removeEventListener("pointerup", onPointerUp);
  }

  function bindInteractions() {
    gantt.removeEventListener("pointerdown", onPointerDown);
    gantt.addEventListener("pointerdown", onPointerDown);

    document.querySelectorAll(".task-bar").forEach(el => {
      el.addEventListener("click", () => {
        const groupIndex = Number(el.dataset.groupIndex);
        const taskIndex = Number(el.dataset.taskIndex);
        const barIndex = Number(el.dataset.barIndex);
        state.rowControlsOpen[`${groupIndex}-${taskIndex}`] = true;
        selectBar(groupIndex, taskIndex, barIndex);
      });
      el.addEventListener("mouseenter", () => {
        const groupIndex = Number(el.dataset.groupIndex);
        const taskIndex = Number(el.dataset.taskIndex);
        const barIndex = Number(el.dataset.barIndex);
        const task = state.groups[groupIndex].tasks[taskIndex];
        const bar = task.bars[barIndex];
        const rect = el.getBoundingClientRect();
        showTooltip(barLabel(task.name, bar), rect.left + rect.width / 2, rect.top);
      });
      el.addEventListener("mouseleave", () => {
        if (!state.activeDrag) hideTooltip();
      });
    });

    document.querySelectorAll(".add-bar-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        addBar(Number(btn.dataset.groupIndex), Number(btn.dataset.taskIndex));
      });
    });

    document.querySelectorAll(".del-bar-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        deleteSelectedBar(Number(btn.dataset.groupIndex), Number(btn.dataset.taskIndex));
      });
    });

    document.querySelectorAll(".color-input").forEach(input => {
      input.addEventListener("input", () => {
        changeSelectedBarColor(Number(input.dataset.groupIndex), Number(input.dataset.taskIndex), input.value);
      });
    });

    document.querySelectorAll(".toggle-controls-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        toggleRowControls(Number(btn.dataset.groupIndex), Number(btn.dataset.taskIndex));
      });
    });
  }

  function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeState()));
    saveBtn.textContent = "Saved";
    setTimeout(() => saveBtn.textContent = "Save", 1200);
  }

  function loadFromLocalStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    try {
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.groups)) return false;
      state.groups = parsed.groups;
      state.phaseFilter = parsed.phaseFilter || "ALL";
      state.rowControlsOpen = parsed.rowControlsOpen || {};
      return true;
    } catch (e) {
      return false;
    }
  }

  function downloadJsonFile() {
    const data = JSON.stringify(serializeState(), null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "timeline-dates.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  phaseFilter.addEventListener("change", () => {
    state.phaseFilter = phaseFilter.value;
    render();
  });

  saveBtn.addEventListener("click", () => {
    saveToLocalStorage();
  });

  resetBtn.addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);
    state.groups = deepClone(initialGroups);
    state.selected = null;
    state.phaseFilter = "ALL";
    state.rowControlsOpen = {};
    render();
  });

  exportBtn.addEventListener("click", async () => {
    updateExportBox();
    exportBox.select();
    try {
      await navigator.clipboard.writeText(exportBox.value);
      downloadJsonFile();
      exportBtn.textContent = "Copied + Downloaded";
      setTimeout(() => exportBtn.textContent = "Export dates", 1400);
    } catch (err) {
      downloadJsonFile();
      exportBtn.textContent = "Downloaded";
      setTimeout(() => exportBtn.textContent = "Export dates", 1400);
    }
  });

  loadFromLocalStorage();
  render();
})();
</script>

</body>
</html>
