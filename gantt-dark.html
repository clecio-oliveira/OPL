<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attachment C Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#eef1f5;
  --panel:#f5f6f8;
  --panel-2:#f0f2f5;
  --grid:#d9dee6;
  --grid-strong:#c8ced8;
  --text:#475467;
  --muted:#7a8599;
  --today:#e05347;

  --left-col: 280px;
  --row-h: 28px;
  --group-h: 24px;
  --bar-h: 14px;
  --radius: 14px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:18px;
}

.gantt-wrap{
  width:100%;
  overflow-x:auto;
}

.gantt{
  min-width:1900px;
  background:var(--panel);
  border:1px solid var(--grid-strong);
  border-radius:var(--radius);
  overflow:hidden;
}

/* HEADER */
.thead{
  display:flex;
  background:var(--panel);
  border-bottom:1px solid var(--grid-strong);
}

.thead-left{
  width:var(--left-col);
  flex-shrink:0;
  border-right:1px solid var(--grid-strong);
}

.thead-top,
.thead-bot{
  display:flex;
  align-items:center;
  padding:0 12px;
  color:#6b7280;
  font-size:11px;
  font-weight:600;
}

.thead-top{
  height:34px;
  border-bottom:1px solid var(--grid);
  text-transform:uppercase;
  letter-spacing:.04em;
}

.thead-bot{
  height:28px;
}

.thead-right{
  flex:1;
  position:relative;
}

.mo-row{
  display:flex;
  height:34px;
  border-bottom:1px solid var(--grid);
}

.mo-cell{
  display:flex;
  align-items:center;
  justify-content:center;
  flex:none;
  border-right:1px solid var(--grid-strong);
  color:#7a8599;
  font-size:13px;
  font-weight:700;
  letter-spacing:.02em;
  text-transform:uppercase;
}

.mo-cell:last-child{border-right:none}

.dt-row{
  height:28px;
  position:relative;
}

.dt-tick{
  position:absolute;
  top:0;
  bottom:0;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#8b95a7;
  font-size:11px;
  font-weight:600;
  white-space:nowrap;
}

.today-header{
  position:absolute;
  top:0;
  bottom:0;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  z-index:4;
}

.today-chip{
  background:#fff;
  color:var(--today);
  border:1px solid rgba(224,83,71,.35);
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  padding:2px 8px;
}

/* GROUP ROW */
.group-row{
  display:flex;
  height:var(--group-h);
  background:#f7f8fa;
  border-top:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
}

.group-label-cell{
  width:var(--left-col);
  flex-shrink:0;
  border-right:1px solid var(--grid-strong);
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 12px;
}

.group-dot{
  width:8px;
  height:8px;
  border-radius:2px;
  flex-shrink:0;
}

.group-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
}

.group-bar-area{
  flex:1;
  position:relative;
}

/* TASK ROWS */
.task-row{
  display:flex;
  height:var(--row-h);
  border-bottom:1px solid var(--grid);
  background:transparent;
}

.task-left{
  width:var(--left-col);
  flex-shrink:0;
  border-right:1px solid var(--grid);
  display:flex;
  align-items:center;
  gap:7px;
  padding:0 10px 0 12px;
}

.task-num{
  min-width:26px;
  font-size:11px;
  color:#6f7a8d;
  font-weight:600;
}

.task-name{
  flex:1;
  font-size:11px;
  line-height:1.15;
  color:#4a5568;
}

.ms-pill{
  font-size:9px;
  font-weight:700;
  padding:2px 6px;
  border-radius:999px;
  white-space:nowrap;
}

.bar-area{
  flex:1;
  position:relative;
  overflow:hidden;
}

.grid-v{
  position:absolute;
  top:0;
  bottom:0;
  width:1px;
  background:var(--grid);
  pointer-events:none;
}

.grid-v.month{
  background:var(--grid-strong);
}

.today-line{
  position:absolute;
  top:0;
  bottom:0;
  width:2px;
  background:var(--today);
  z-index:3;
  pointer-events:none;
}

.task-bar,
.ms-bar{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  height:var(--bar-h);
  border-radius:999px;
}

.task-bar{
  opacity:.95;
}

.ms-bar{
  opacity:.22;
}

.ms-dia{
  position:absolute;
  top:50%;
  width:12px;
  height:12px;
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:2px;
}

.legend{
  display:flex;
  align-items:center;
  gap:18px;
  margin-top:12px;
  padding:0 4px;
  color:#6f7a8d;
  font-size:12px;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:7px;
}

.leg-line{
  width:16px;
  height:2px;
  background:var(--today);
}

.leg-dia{
  width:9px;
  height:9px;
  background:#7f8aa0;
  transform:rotate(45deg);
  border-radius:1px;
}

.leg-bar{
  width:20px;
  height:10px;
  border-radius:999px;
  background:#aeb7c5;
}

@media (max-width: 1100px){
  .gantt{min-width:1700px}
}
</style>
</head>
<body>

<div class="gantt-wrap">
  <div class="gantt" id="gantt"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="leg-line"></div><span>Today</span></div>
  <div class="legend-item"><div class="leg-dia"></div><span>Milestone</span></div>
  <div class="legend-item"><div class="leg-bar"></div><span>Task duration</span></div>
</div>

<script>
(function () {
  const START = new Date(2026, 0, 1);
  const END = new Date(2026, 6, 1); // Jul 1 exclusive
  const TODAY = new Date(2026, 2, 31);
  const SPAN = END - START;

  const pct = d => Math.max(0, Math.min(100, ((new Date(d) - START) / SPAN) * 100));
  const todayPct = ((TODAY - START) / SPAN) * 100;

  const months = [
    { year: 2026, mo: 0, label: "JAN '26", days: 31 },
    { year: 2026, mo: 1, label: "FEB '26", days: 28 },
    { year: 2026, mo: 2, label: "MAR '26", days: 31 },
    { year: 2026, mo: 3, label: "APR '26", days: 30 },
    { year: 2026, mo: 4, label: "MAY '26", days: 31 },
    { year: 2026, mo: 5, label: "JUN '26", days: 30 }
  ];

  const totalDays = months.reduce((sum, m) => sum + m.days, 0);
  let accDays = 0;
  const monthWidths = months.map(m => {
    const left = (accDays / totalDays) * 100;
    accDays += m.days;
    return { ...m, left, width: (m.days / totalDays) * 100 };
  });

  const dateTicks = [];
  months.forEach(m => {
    [1, 8, 15, 22, 29].forEach(day => {
      if (day <= m.days) {
        const d = new Date(m.year, m.mo, day);
        if (d >= START && d < END) {
          dateTicks.push({
            left: ((d - START) / SPAN) * 100,
            label: day
          });
        }
      }
    });
  });

  const groups = [
    {
      label: "PROJECT PLANNING",
      color: "#a67cf2",
      tasks: [
        { id: 0, name: "Pre-Implementation Discussions", start: "2025-11-13", end: "2026-04-15" },
        { id: 1, name: "Project Plan", start: "2026-01-20", end: "2026-04-15" }
      ]
    },
    {
      label: "ACCOUNT CONFIGURATION",
      color: "#5fa7ea",
      tasks: [
        { id: 2, name: "OOTB Config & Integration Instructions", start: "2026-01-20", end: "2026-02-28" },
        { id: 3, name: "OOTB Configuration (Production)", start: "2026-01-20", end: "2026-03-09" },
        { id: 4, name: "OOTB Config & Accessibility Review", start: "2026-03-10", end: "2026-03-16" },
        { id: 5, name: "OOTB Config & Accessibility Adjustments", start: "2026-03-17", end: "2026-04-01" },
        { id: 6, name: "OOTB Configuration Validation", start: "2026-03-24", end: "2026-04-22" }
      ]
    },
    {
      label: "TEST ENVIRONMENT",
      color: "#6fd0c9",
      tasks: [
        { id: 7, name: "Test Environment (Sandbox) Ready", start: "2026-03-27", end: "2026-03-31", milestone: true }
      ]
    },
    {
      label: "DATA MIGRATION",
      color: "#e8b089",
      tasks: [
        { id: 8, name: "Data Migration & Validation (Production)", start: "2026-03-31", end: "2026-04-27", milestone: true, milestoneAtEnd: true }
      ]
    },
    {
      label: "USER TRAINING, TESTING & VALIDATIONS",
      color: "#59c57d",
      tasks: [
        { id: 9,  name: "OOTB Integrations Config & Testing (Sandbox)", start: "2026-03-31", end: "2026-04-06" },
        { id: 10, name: "Staff Training, Wave 1 (Foundational)", start: "2026-03-31", end: "2026-04-06" },
        { id: 11, name: "Staff Training, Wave 1 (Advanced/Make-up)", start: "2026-04-07", end: "2026-04-13" },
        { id: 13, name: "User Acceptance Testing (UAT) (Sandbox)", start: "2026-04-07", end: "2026-04-20" },
        { id: 14, name: "OOTB Integrations Config & Testing (Prod)", start: "2026-04-07", end: "2026-04-13" },
        { id: 15, name: "Security & Privacy Validation (Prod)", start: "2026-04-07", end: "2026-04-13" },
        { id: 16, name: "Cutover Planning & Runbooks", start: "2026-04-14", end: "2026-04-27" }
      ]
    },
    {
      label: "INTERNAL SOFT LAUNCH & PRACTICE",
      color: "#ef8db8",
      tasks: [
        { id: 17, name: "Internal Soft Launch / Staff-Only (Prod)", start: "2026-05-01", end: "2026-05-01", milestone: true },
        { id: 18, name: "Stabilization & Staff Practice (Prod)", start: "2026-05-01", end: "2026-05-18" }
      ]
    },
    {
      label: "PUBLIC LAUNCH / GO-LIVE",
      color: "#f18484",
      tasks: [
        { id: 19, name: "Final Go/No-Go Readiness Review", start: "2026-05-19", end: "2026-05-21" },
        { id: 20, name: "Public Launch / Go-Live (Production)", start: "2026-06-01", end: "2026-06-01", milestone: true }
      ]
    },
    {
      label: "POST-LAUNCH",
      color: "#74dced",
      tasks: [
        { id: 21, name: "Hypercare", start: "2026-06-01", end: "2026-06-15" },
        { id: 22, name: "Post-Implementation Review", start: "2026-06-16", end: "2026-06-29" }
      ]
    }
  ];

  const gantt = document.getElementById("gantt");

  let monthHtml = "";
  monthWidths.forEach(m => {
    monthHtml += `<div class="mo-cell" style="width:${m.width}%">${m.label}</div>`;
  });

  let tickHtml = `<div class="today-header" style="left:${todayPct}%"><div class="today-chip">TODAY</div></div>`;
  dateTicks.forEach(t => {
    tickHtml += `<div class="dt-tick" style="left:${t.left}%">${t.label}</div>`;
  });

  gantt.innerHTML = `
    <div class="thead">
      <div class="thead-left">
        <div class="thead-top">PHASE / TASK</div>
        <div class="thead-bot">Day</div>
      </div>
      <div class="thead-right">
        <div class="mo-row">${monthHtml}</div>
        <div class="dt-row">${tickHtml}</div>
      </div>
    </div>
  `;

  let gridHtml = "";
  dateTicks.forEach(t => {
    gridHtml += `<div class="grid-v" style="left:${t.left}%"></div>`;
  });
  monthWidths.forEach(m => {
    if (m.left > 0) {
      gridHtml += `<div class="grid-v month" style="left:${m.left}%"></div>`;
    }
  });

  const todayLine = `<div class="today-line" style="left:${todayPct}%"></div>`;

  groups.forEach(group => {
    const groupRow = document.createElement("div");
    groupRow.className = "group-row";
    groupRow.innerHTML = `
      <div class="group-label-cell">
        <div class="group-dot" style="background:${group.color}"></div>
        <div class="group-label" style="color:${group.color}">${group.label}</div>
      </div>
      <div class="group-bar-area">
        ${gridHtml}
        ${todayLine}
      </div>
    `;
    gantt.appendChild(groupRow);

    group.tasks.forEach(task => {
      const left = pct(task.start);
      const right = pct(task.end);
      let width = Math.max(right - left, 0.65);

      let barMarkup = "";
      if (task.milestone) {
        if (task.milestoneAtEnd && right > left) {
          barMarkup = `
            <div class="ms-bar" style="left:${left}%;width:${width}%;background:${group.color}"></div>
            <div class="ms-dia" style="left:${right}%;background:${group.color}"></div>
          `;
        } else if (Math.abs(right - left) < 0.2) {
          barMarkup = `<div class="ms-dia" style="left:${left}%;background:${group.color}"></div>`;
        } else {
          barMarkup = `
            <div class="ms-bar" style="left:${left}%;width:${width}%;background:${group.color}"></div>
            <div class="ms-dia" style="left:${left + width / 2}%;background:${group.color}"></div>
          `;
        }
      } else {
        barMarkup = `<div class="task-bar" style="left:${left}%;width:${width}%;background:${group.color}"></div>`;
      }

      const pill = task.milestone
        ? `<span class="ms-pill" style="background:${group.color}22;color:${group.color};border:1px solid ${group.color}44">MS</span>`
        : "";

      const row = document.createElement("div");
      row.className = "task-row";
      row.innerHTML = `
        <div class="task-left">
          <span class="task-num">#${task.id}</span>
          <span class="task-name">${task.name}</span>
          ${pill}
        </div>
        <div class="bar-area">
          ${gridHtml}
          ${todayLine}
          ${barMarkup}
        </div>
      `;
      gantt.appendChild(row);
    });
  });
})();
</script>
</body>
</html>
